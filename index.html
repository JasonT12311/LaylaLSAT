}
function formatDateShort(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function formatDateLong(d) {
  if (!d) return 'unfiled';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}
function clamp(n, min, max) { return Math.min(max, Math.max(min, n)); }

function exhibitLabel(i) {
  let n = i, s = '';
  do {
    s = String.fromCharCode(65 + (n % 26)) + s;
    n = Math.floor(n / 26) - 1;
  } while (n >= 0);
  return s;
}

function computeStreak(sessions) {
  const days = new Set(sessions.map((s) => s.date));
  if (days.size === 0) return 0;
  let cursor = new Date();
  if (!days.has(cursor.toISOString().slice(0, 10))) {
    cursor.setDate(cursor.getDate() - 1);
  }
  let streak = 0;
  while (true) {
    const ds = cursor.toISOString().slice(0, 10);
    if (days.has(ds)) {
      streak += 1;
      cursor.setDate(cursor.getDate() - 1);
    } else break;
  }
  return streak;
}

function computeStats(data) {
  const totalMinutes = data.sessions.reduce((sum, s) => sum + (Number(s.minutes) || 0), 0);
  const totalHours = totalMinutes / 60;
  const totalMiles = data.walks.reduce((sum, w) => sum + (Number(w.miles) || 0), 0);
  const ptCount = data.practiceTests.length;
  const bestScore = ptCount ? Math.max(...data.practiceTests.map((p) => Number(p.overall) || 0)) : 0;
  const streak = computeStreak(data.sessions);
  const target = Number(data.settings.targetScore) || 0;
  const targetHit = ptCount > 0 && target > 0 && data.practiceTests.some((p) => Number(p.overall) >= target);
  return { totalMinutes, totalHours, totalMiles, ptCount, bestScore, streak, targetHit, totalSessions: data.sessions.length };
}

function getBanner(streak, daysToTrial) {
  if (daysToTrial !== null && daysToTrial >= 0 && daysToTrial <= 7) {
    return `T-minus ${daysToTrial} day${daysToTrial === 1 ? '' : 's'}. Trust the prep — close the file with confidence.`;
  }
  if (streak === 0) return "New day, clean docket. Log a session to open today's entry.";
  if (streak === 1) return 'Day one on the record. Every strong case starts with an entry.';
  if (streak <= 3) return `${streak} days running. Law school isn't ready for you.`;
  if (streak <= 6) return `${streak}-day streak on the books. The bar has been warned.`;
  if (streak <= 13) return `${streak} days straight. Objection: she's clearly prepared.`;
  return `${streak} days in a row. All rise — this one means business.`;
}

function quoteOfDay() {
  const start = new Date(new Date().getFullYear(), 0, 0);
  const diff = Date.now() - start.getTime();
  const dayOfYear = Math.floor(diff / 86400000);
  return QUOTES[dayOfYear % QUOTES.length];
}

function App() {

  const [tab, setTab] = useState('overview');
  const [editingSettings, setEditingSettings] = useState(false);
  const [toasts, setToasts] = useState([]);
  const prevUnlockedRef = useRef(null);

  // ---- load ----
  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(STORAGE_KEY, false);
        if (res && res.value) {
          const parsed = JSON.parse(res.value);
          setData({
            ...DEFAULT_DATA,
            ...parsed,
            settings: { ...DEFAULT_DATA.settings, ...(parsed.settings || {}) },
          });
        }
      } catch (e) {
        // no existing file yet — start fresh
      } finally {
        setLoaded(true);
      }
    })();
  }, []);

  // ---- save ----
  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try {
        const result = await window.storage.set(STORAGE_KEY, JSON.stringify(data), false);
        setSaveError(!result);
      } catch (e) {
        setSaveError(true);
      }
    })();
  }, [data, loaded]);

  // ---- badge unlock toasts ----
  useEffect(() => {
    if (!loaded) return;
    const stats = computeStats(data);
    const unlocked = new Set(BADGES.filter((b) => b.check(stats)).map((b) => b.id));
    if (prevUnlockedRef.current === null) {
      prevUnlockedRef.current = unlocked;
      return;
    }
    const fresh = [...unlocked].filter((id) => !prevUnlockedRef.current.has(id));
    if (fresh.length) {
      const newToasts = fresh.map((id) => ({ id: uid(), text: BADGES.find((b) => b.id === id).label }));
      setToasts((t) => [...t, ...newToasts]);
      newToasts.forEach((t) => {
        setTimeout(() => setToasts((cur) => cur.filter((x) => x.id !== t.id)), 5200);
      });
    }
    prevUnlockedRef.current = unlocked;
  }, [data, loaded]);

  const stats = useMemo(() => computeStats(data), [data]);

  const sortedPTs = useMemo(
    () => [...data.practiceTests].sort((a, b) => a.date.localeCompare(b.date)),
    [data.practiceTests]
  );

  // cumulative hours studied as of each date (for correlation)
  const cumulativeHoursByDate = useCallback(
    (dateStr) => {
      const mins = data.sessions
        .filter((s) => s.date <= dateStr)
        .reduce((sum, s) => sum + (Number(s.minutes) || 0), 0);
      return +(mins / 60).toFixed(1);
    },
    [data.sessions]
  );

  // ---- countdown ----
  const [now, setNow] = useState(Date.now());
  useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, []);
  const testDate = data.settings.testDate;
  const remainingMs = testDate ? new Date(testDate + 'T09:00:00').getTime() - now : null;
  const daysToTrial = remainingMs !== null ? Math.floor(remainingMs / 86400000) : null;

  function mutate(fn) {
    setData((prev) => fn(JSON.parse(JSON.stringify(prev))));
  }

  function addPT(entry) {
    mutate((d) => { d.practiceTests.push({ id: uid(), ...entry }); return d; });
  }
  function deletePT(id) {
    mutate((d) => { d.practiceTests = d.practiceTests.filter((p) => p.id !== id); return d; });
  }
  function addSession(entry) {
    mutate((d) => { d.sessions.push({ id: uid(), ...entry }); return d; });
  }
  function deleteSession(id) {
    mutate((d) => { d.sessions = d.sessions.filter((s) => s.id !== id); return d; });

  function addWalk(entry) {

function CategoryLineChart({ data, series, yMin, yMax, yTicks, height = 240, referenceY, referenceLabel }) {
  const W = 640, H = height;
  const padL = 34, padR = 12, padT = 16, padB = 26;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const n = data.length;
  const x = (i) => (n <= 1 ? padL + plotW / 2 : padL + (i * plotW) / (n - 1));
  const y = (v) => padT + plotH - ((v - yMin) / (yMax - yMin || 1)) * plotH;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: 'block', height: 'auto' }}>
      {yTicks.map((t) => (
        <g key={t}>
          <line x1={padL} x2={W - padR} y1={y(t)} y2={y(t)} stroke="#F3CFE0" strokeWidth="1" />
          <text x={padL - 6} y={y(t) + 3} textAnchor="end" fontSize="10" fill="#9c6b7c">{t}</text>
        </g>
      ))}
      {data.map((d, i) => (
        <text key={i} x={x(i)} y={H - 6} textAnchor="middle" fontSize="10" fill="#9c6b7c">{d.label}</text>
      ))}
      {referenceY != null && (
        <g>
          <line x1={padL} x2={W - padR} y1={y(referenceY)} y2={y(referenceY)} stroke="#C99A2E" strokeWidth="1.5" strokeDasharray="5 4" />
          {referenceLabel && <text x={padL + 4} y={y(referenceY) - 5} fontSize="10" fill="#C99A2E">{referenceLabel}</text>}
        </g>
      )}
      {series.map((s) => (
        <g key={s.key}>
          <polyline
            points={data.map((d, i) => `${x(i)},${y(d[s.key])}`).join(' ')}
            fill="none" stroke={s.color} strokeWidth={s.width || 2.5} strokeLinecap="round" strokeLinejoin="round"
          />
          {data.map((d, i) => (
            <circle key={i} cx={x(i)} cy={y(d[s.key])} r={4} fill={s.color}>
              <title>{`${d.label}: ${d[s.key]}`}</title>
            </circle>
          ))}
        </g>
      ))}
    </svg>
  );
}

function NumericLineChart({ data, color, yMin, yMax, yTicks, height = 240, xAxisLabel }) {
  const W = 640, H = height;
  const padL = 34, padR = 12, padT = 16, padB = 34;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const xs = data.map((d) => d.x);
  const xMin = Math.min(...xs, 0), xMax = Math.max(...xs, 1);
  const xScale = (v) => padL + ((v - xMin) / (xMax - xMin || 1)) * plotW;
  const y = (v) => padT + plotH - ((v - yMin) / (yMax - yMin || 1)) * plotH;
  const xTicks = 4;
  const xTickVals = Array.from({ length: xTicks + 1 }, (_, i) => +(xMin + ((xMax - xMin) * i) / xTicks).toFixed(1));
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: 'block', height: 'auto' }}>
      {yTicks.map((t) => (
        <g key={t}>
          <line x1={padL} x2={W - padR} y1={y(t)} y2={y(t)} stroke="#F3CFE0" strokeWidth="1" />
          <text x={padL - 6} y={y(t) + 3} textAnchor="end" fontSize="10" fill="#9c6b7c">{t}</text>
        </g>
      ))}
      {xTickVals.map((t, i) => (
        <text key={i} x={xScale(t)} y={H - 18} textAnchor="middle" fontSize="10" fill="#9c6b7c">{t}</text>
      ))}
      {xAxisLabel && <text x={padL + plotW / 2} y={H - 4} textAnchor="middle" fontSize="10" fill="#9c6b7c">{xAxisLabel}</text>}
      <polyline
        points={data.map((d) => `${xScale(d.x)},${y(d.y)}`).join(' ')}
        fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
      />
      {data.map((d, i) => (
        <circle key={i} cx={xScale(d.x)} cy={y(d.y)} r={4} fill={color}>
          <title>{`${d.label}: ${d.y} @ ${d.x}h`}</title>
        </circle>
      ))}
    </svg>
  );
}

function GroupedBarChart({ data, series, yMin, yMax, yTicks, height = 240 }) {
  const W = 640, H = height;
  const padL = 34, padR = 12, padT = 16, padB = 26;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const n = Math.max(data.length, 1);
  const groupW = plotW / n;
  const barW = Math.min(26, groupW / (series.length + 1));
  const y = (v) => padT + plotH - ((v - yMin) / (yMax - yMin || 1)) * plotH;
  const baseY = padT + plotH;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: 'block', height: 'auto' }}>
      {yTicks.map((t) => (
        <g key={t}>
          <line x1={padL} x2={W - padR} y1={y(t)} y2={y(t)} stroke="#F3CFE0" strokeWidth="1" />
          <text x={padL - 6} y={y(t) + 3} textAnchor="end" fontSize="10" fill="#9c6b7c">{t}</text>
        </g>
      ))}
      {data.map((d, i) => {
        const groupX = padL + i * groupW + groupW / 2;
        return (
          <g key={i}>
            {series.map((s, si) => {
              const val = d[s.key];
              const by = y(val);
              const bx = groupX - (series.length * barW) / 2 + si * barW;
              return (
                <rect key={s.key} x={bx} y={by} width={Math.max(barW - 2, 1)} height={Math.max(baseY - by, 0)} fill={s.color} rx="2">
                  <title>{`${d.label} ${s.key}: ${val}`}</title>
                </rect>
              );
            })}
            <text x={groupX} y={H - 6} textAnchor="middle" fontSize="10" fill="#9c6b7c">{d.label}</text>
          </g>
        );
      })}
    </svg>
  );
}

function trendWord(sortedPTs) {
  if (sortedPTs.length < 2) return 'up (one data point so far)';
  const last3 = sortedPTs.slice(-3).map((p) => Number(p.overall));
  const delta = last3[last3.length - 1] - last3[0];
  if (delta > 0) return 'upward';
  if (delta < 0) return 'down slightly — a good week to slow down and blind review';
  return 'flat — steady, could use a push';
}

// ================= STUDY TAB (timer + heatmap) =================
function StudyTab({ sessions, onAddSession, onDeleteSession }) {
  const [mode, setMode] = useState('stopwatch'); // stopwatch | pomodoro
  const [running, setRunning] = useState(false);
  const [elapsed, setElapsed] = useState(0); // stopwatch seconds
  const [pomPhase, setPomPhase] = useState('work');
  const [pomSecondsLeft, setPomSecondsLeft] = useState(25 * 60);
  const phaseRef = useRef('work');

  useEffect(() => {
    if (!running) return;
    const id = setInterval(() => {
      if (mode === 'stopwatch') {
        setElapsed((e) => e + 1);
      } else {
        setPomSecondsLeft((sec) => {
          if (sec <= 1) {
            if (phaseRef.current === 'work') {
              onAddSession({ date: todayISO(), minutes: 25 });
              phaseRef.current = 'break';
              setPomPhase('break');
              return 5 * 60;
            } else {
              phaseRef.current = 'work';
              setPomPhase('work');
              return 25 * 60;
            }
          }
          return sec - 1;
        });
      }
    }, 1000);
    return () => clearInterval(id);
  }, [running, mode]);

  function resetTimer() {
    setRunning(false);
    setElapsed(0);
    setPomSecondsLeft(25 * 60);
    phaseRef.current = 'work';
    setPomPhase('work');
  }

  function logStopwatch() {
    const minutes = Math.round(elapsed / 60);
    if (minutes > 0) onAddSession({ date: todayISO(), minutes });
    setRunning(false);
    setElapsed(0);
  }

  function fmtClock(totalSeconds) {
    const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
    const s = Math.floor(totalSeconds % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }

  const [manual, setManual] = useState({ date: todayISO(), minutes: '' });
  function submitManual(e) {
    e.preventDefault();
    if (!manual.minutes) return;
    onAddSession({ date: manual.date, minutes: clamp(Number(manual.minutes), 1, 1000) });
    setManual({ date: todayISO(), minutes: '' });
  }

  // heatmap: last 12 weeks
  const weeks = 12;
  const dayCells = useMemo(() => {
    const byDate = {};
    sessions.forEach((s) => { byDate[s.date] = (byDate[s.date] || 0) + (Number(s.minutes) || 0); });
    const cells = [];
    const end = new Date();
    end.setHours(0, 0, 0, 0);
    const totalDays = weeks * 7;
    for (let i = totalDays - 1; i >= 0; i--) {
      const d = new Date(end);
      d.setDate(d.getDate() - i);
      const ds = d.toISOString().slice(0, 10);
      cells.push({ date: ds, minutes: byDate[ds] || 0 });
    }
    return cells;
  }, [sessions]);

  function heatClass(minutes) {
    if (minutes <= 0) return 'heat-0';
    if (minutes < 30) return 'heat-1';
    if (minutes < 60) return 'heat-2';
    if (minutes < 120) return 'heat-3';
    return 'heat-4';
  }

  const recent = [...sessions].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 8);

  return (
    <div className="space-y-6">
      <div className="cf-card rounded-lg p-4 md:p-5">
        <SectionTitle icon={TimerIcon}>Study timer</SectionTitle>
        <div className="flex gap-2 mb-4">
          <button
            onClick={() => { setMode('stopwatch'); resetTimer(); }}
            className={`px-3 py-1.5 rounded text-xs font-medium ${mode === 'stopwatch' ? 'cf-btn-primary' : 'cf-btn-ghost'}`}
          >Stopwatch</button>
          <button
            onClick={() => { setMode('pomodoro'); resetTimer(); }}
            className={`px-3 py-1.5 rounded text-xs font-medium ${mode === 'pomodoro' ? 'cf-btn-primary' : 'cf-btn-ghost'}`}
          >Pomodoro 25/5</button>
        </div>

        <div className="flex flex-col items-center py-4">
          {mode === 'pomodoro' && (
            <div className="text-xs uppercase tracking-widest opacity-60 mb-1">
              {pomPhase === 'work' ? 'Focus block' : 'Break'}
            </div>
          )}
          <div className="cf-mono text-5xl md:text-6xl font-semibold" style={{ color: '#990000' }}>
            {mode === 'stopwatch' ? fmtClock(elapsed) : fmtClock(pomSecondsLeft)}
          </div>
          <div className="flex gap-3 mt-5">
            <button onClick={() => setRunning((r) => !r)} className="cf-btn-primary rounded-full p-3" aria-label={running ? 'Pause' : 'Start'}>
              {running ? <Pause size={20} /> : <Play size={20} />}
            </button>
            <button onClick={resetTimer} className="cf-btn-ghost rounded-full p-3" aria-label="Reset">
              <RotateCcw size={20} />
            </button>
            {mode === 'stopwatch' && (
              <button onClick={logStopwatch} className="cf-btn-ghost rounded-full px-4 flex items-center gap-1.5 text-sm">
                <Check size={16} /> Log & reset
              </button>
            )}
          </div>
          {mode === 'pomodoro' && (
            <div className="text-[11px] opacity-50 mt-3">Each completed focus block logs 25 minutes automatically.</div>
          )}
        </div>
      </div>

      <div className="cf-card rounded-lg p-4 md:p-5">
        <SectionTitle icon={Calendar}>Weekly heatmap</SectionTitle>
        <div className="overflow-x-auto">
          <div className="grid gap-1" style={{ gridTemplateColumns: `repeat(${weeks}, minmax(0,1fr))`, gridAutoFlow: 'column', gridTemplateRows: 'repeat(7, minmax(0,1fr))', width: 'max-content' }}>
            {dayCells.map((c) => (
              <div
                key={c.date}
                title={`${c.date}: ${c.minutes} min`}
                className={`w-3.5 h-3.5 md:w-4 md:h-4 rounded-sm ${heatClass(c.minutes)}`}
              />
            ))}
          </div>
        </div>
        <div className="flex items-center gap-1.5 mt-3 text-[10px] opacity-60">
          Less
          {['heat-0', 'heat-1', 'heat-2', 'heat-3', 'heat-4'].map((h) => (
            <div key={h} className={`w-3 h-3 rounded-sm ${h}`} />
          ))}
          More
        </div>
      </div>

      <div className="cf-card rounded-lg p-4 md:p-5">
        <SectionTitle icon={Plus}>Log a past session</SectionTitle>
        <form onSubmit={submitManual} className="flex flex-wrap gap-3 items-end">
          <label className="text-xs">
            <div className="uppercase tracking-widest opacity-60 mb-1">Date</div>
            <input type="date" value={manual.date} onChange={(e) => setManual({ ...manual, date: e.target.value })} className="cf-input rounded px-2 py-1.5" />
          </label>
          <label className="text-xs">
            <div className="uppercase tracking-widest opacity-60 mb-1">Minutes</div>
            <input type="number" min="1" value={manual.minutes} onChange={(e) => setManual({ ...manual, minutes: e.target.value })} placeholder="45" className="cf-input rounded px-2 py-1.5 w-24" />
          </label>
          <button type="submit" className="cf-btn-primary rounded px-4 py-2 text-sm flex items-center gap-1.5">
            <Plus size={14} /> Add
          </button>
        </form>
      </div>

      {recent.length > 0 && (
        <div className="cf-card rounded-lg p-4 md:p-5">
          <SectionTitle icon={FileText}>Recent sessions</SectionTitle>
          <div className="space-y-1.5">
            {recent.map((s) => (
              <div key={s.id} className="flex items-center justify-between text-sm py-1.5 px-2 rounded" style={{ background: '#FFFBFC' }}>
                <span>{formatDateShort(s.date)} — {s.minutes} min</span>
                <button onClick={() => onDeleteSession(s.id)} className="opacity-40 hover:opacity-100"><Trash2 size={14} /></button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ================= WALKS TAB =================
function WalksTab({ walks, onAdd, onDelete, stats, sortedPTs }) {
  const [form, setForm] = useState({ date: todayISO(), miles: '', note: '' });
  function submit(e) {
    e.preventDefault();
    if (!form.miles) return;
    onAdd({ date: form.date, miles: clamp(Number(form.miles), 0.1, 50), note: form.note });
    setForm({ date: todayISO(), miles: '', note: '' });
  }

  const scoreIncrease = sortedPTs.length >= 2
    ? Number(sortedPTs[sortedPTs.length - 1].overall) - Number(sortedPTs[0].overall)
    : null;

  const sorted = [...walks].sort((a, b) => b.date.localeCompare(a.date));

  return (
    <div className="space-y-6">
      <div className="cf-card rounded-lg p-4 md:p-5" style={{ background: 'linear-gradient(135deg,#FFF7FA,#FDE4EC)' }}>
        <div className="flex items-center gap-3">
          <Footprints size={28} style={{ color: '#B0104C' }} />
          <div>
            <div className="cf-serif text-lg md:text-xl font-semibold" style={{ color: '#990000' }}>
              {stats.totalMiles.toFixed(1)} miles walked during study breaks
            </div>
            <div className="text-sm opacity-70">
              {scoreIncrease !== null
                ? `= a ${scoreIncrease >= 0 ? '+' : ''}${scoreIncrease}-point move since the first exhibit. Coincidence? We think not.`
                : 'File a couple practice tests to see this stack up against the score trend.'}
            </div>
          </div>
        </div>
      </div>

      <div className="cf-card rounded-lg p-4 md:p-5">
        <SectionTitle icon={Plus}>Log a walk break</SectionTitle>
        <form onSubmit={submit} className="flex flex-wrap gap-3 items-end">
          <label className="text-xs">
            <div className="uppercase tracking-widest opacity-60 mb-1">Date</div>
            <input type="date" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} className="cf-input rounded px-2 py-1.5" />
          </label>
          <label className="text-xs">
            <div className="uppercase tracking-widest opacity-60 mb-1">Miles</div>
            <input type="number" step="0.1" min="0.1" value={form.miles} onChange={(e) => setForm({ ...form, miles: e.target.value })} placeholder="1.5" className="cf-input rounded px-2 py-1.5 w-24" />
          </label>
          <label className="text-xs flex-1 min-w-[140px]">
            <div className="uppercase tracking-widest opacity-60 mb-1">Note (optional)</div>
            <input value={form.note} onChange={(e) => setForm({ ...form, note: e.target.value })} placeholder="Between LR sections" className="cf-input rounded px-2 py-1.5 w-full" />
          </label>
          <button type="submit" className="cf-btn-primary rounded px-4 py-2 text-sm flex items-center gap-1.5">
            <Plus size={14} /> Add
          </button>
        </form>
      </div>

      <div className="cf-card rounded-lg p-4 md:p-5">
        <SectionTitle icon={MapPin}>Walk log</SectionTitle>
        {sorted.length === 0 ? (
          <EmptyState text="No walk breaks logged yet." />
        ) : (
          <div className="space-y-1.5">
            {sorted.map((w) => (
              <div key={w.id} className="flex items-center justify-between text-sm py-1.5 px-2 rounded" style={{ background: '#FFFBFC' }}>
                <span>{formatDateShort(w.date)} — {w.miles} mi{w.note ? ` · ${w.note}` : ''}</span>
                <button onClick={() => onDelete(w.id)} className="opacity-40 hover:opacity-100"><Trash2 size={14} /></button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ================= BADGES TAB =================
function BadgesTab({ stats }) {
  return (
    <div className="space-y-4">
      <SectionTitle icon={Award}>Achievements</SectionTitle>
      <div className="cf-card rounded-lg p-3 md:p-4 text-sm cf-serif" style={{ color: '#990000' }}>
        Each one unlocks a photo. Work for it.
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        {BADGES.map((b) => {
          const unlocked = b.check(stats);
          const Icon = b.icon;
          const photo = PHOTOS.find((p) => p.id === b.photoId);
          return (
            <div key={b.id} className={`stamp ${unlocked ? 'unlocked' : ''} rounded-lg p-4 flex flex-col items-center text-center gap-1.5`}>
              {photo && (
                <div className="w-16 h-16 rounded-full overflow-hidden mb-1" style={{ border: unlocked ? '2px solid #B0104C' : '2px solid #E8B9CB' }}>
                  <img
                    src={photo.data}
                    alt={unlocked ? photo.caption : 'locked photo'}
                    className="w-full h-full object-cover"
                    style={unlocked ? {} : { filter: 'blur(8px) grayscale(60%)', opacity: 0.6 }}
                  />
                </div>
              )}
              <Icon size={20} />
              <div className="cf-serif font-semibold text-sm">{b.label}</div>
              <div className="text-[11px] opacity-80">{b.sub}</div>
              {!unlocked && <div className="cf-mono text-[10px] opacity-60 mt-1">{b.progress(stats)}</div>}
              {unlocked && <div className="cf-mono text-[10px] mt-1">EARNED</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ================= PHOTO BREAK TAB =================
function PhotosTab({ stats }) {
  const orderedEntries = useMemo(
    () => PHOTO_MILESTONES
      .map((m) => ({ milestone: m, photo: PHOTOS.find((p) => p.id === m.photoId) }))
      .filter((e) => e.photo),
    []
  );
  const unlockedPhotos = useMemo(
    () => orderedEntries.filter((e) => e.milestone.check(stats)).map((e) => e.photo),
    [orderedEntries, stats]
  );
  const unlockedCount = unlockedPhotos.length;

  const [openIndex, setOpenIndex] = useState(null); // index into unlockedPhotos

  useEffect(() => {
    if (openIndex === null || unlockedCount === 0) return;
    function onKey(e) {
      if (e.key === 'Escape') setOpenIndex(null);
      if (e.key === 'ArrowRight') setOpenIndex((i) => (i + 1) % unlockedCount);
      if (e.key === 'ArrowLeft') setOpenIndex((i) => (i - 1 + unlockedCount) % unlockedCount);
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [openIndex, unlockedCount]);

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <SectionTitle icon={Camera}>Photo break</SectionTitle>
        <button
          onClick={() => unlockedCount > 0 && setOpenIndex(Math.floor(Math.random() * unlockedCount))}
          disabled={unlockedCount === 0}
          className="cf-btn-ghost rounded px-3 py-1.5 text-xs flex items-center gap-1.5 disabled:opacity-40"
        >
          <Shuffle size={13} /> Surprise me
        </button>
      </div>
      <div className="cf-card rounded-lg p-3 md:p-4 text-sm cf-serif flex items-center justify-between gap-3 flex-wrap" style={{ color: '#990000' }}>
        <span>Two more minutes on the clock isn't going to move the needle. Step away, look at these, come back sharper.</span>
        <span className="cf-mono text-xs opacity-70 flex-shrink-0">{unlockedCount}/{orderedEntries.length} unlocked</span>
      </div>

      <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 md:gap-3">
        {orderedEntries.map(({ milestone, photo }) => {
          const unlocked = milestone.check(stats);
          if (unlocked) {
            const idxInUnlocked = unlockedPhotos.findIndex((p) => p.id === photo.id);
            return (
              <button
                key={photo.id}
                onClick={() => setOpenIndex(idxInUnlocked)}
                className="relative rounded-lg overflow-hidden aspect-square group"
                style={{ border: '1px solid #F3CFE0' }}
                aria-label={`Open photo: ${photo.caption}`}
              >
                <img src={photo.data} alt={photo.caption} className="w-full h-full object-cover transition group-hover:scale-105" />
              </button>
            );
          }
          return (
            <div
              key={photo.id}
              className="relative rounded-lg overflow-hidden aspect-square flex flex-col items-center justify-center text-center p-2"
              style={{ border: '1px solid #F3CFE0' }}
              aria-label="Locked photo"
            >
              <img
                src={photo.data}
                alt="locked"
                className="absolute inset-0 w-full h-full object-cover"
                style={{ filter: 'blur(40px) grayscale(70%)', opacity: 0.20 }}
              />
              <div className="relative z-10 flex flex-col items-center gap-1" style={{ color: '#FFFBFC' }}>
                <Lock size={18} />
                <div className="cf-mono text-[10px] leading-tight px-1">{milestone.hint}</div>
              </div>
            </div>
          );
        })}
      </div>

      {openIndex !== null && unlockedCount > 0 && (
        <div
          className="fixed inset-0 z-50 flex items-center justify-center p-4"
          style={{ background: 'rgba(40,8,20,0.85)' }}
          onClick={() => setOpenIndex(null)}
        >
          <button
            onClick={(e) => { e.stopPropagation(); setOpenIndex(null); }}
            className="absolute top-4 right-4 text-white opacity-80 hover:opacity-100"
            aria-label="Close"
          >
            <X size={26} />
          </button>
          <button
            onClick={(e) => { e.stopPropagation(); setOpenIndex((i) => (i - 1 + unlockedCount) % unlockedCount); }}
            className="absolute left-2 md:left-6 text-white opacity-80 hover:opacity-100"
            aria-label="Previous photo"
          >
            <ChevronLeft size={32} />
          </button>
          <button
            onClick={(e) => { e.stopPropagation(); setOpenIndex((i) => (i + 1) % unlockedCount); }}
            className="absolute right-2 md:right-6 text-white opacity-80 hover:opacity-100"
            aria-label="Next photo"
          >
            <ChevronRight size={32} />
          </button>
          <div className="max-w-2xl w-full" onClick={(e) => e.stopPropagation()}>
            <img
              src={unlockedPhotos[openIndex].data}
              alt={unlockedPhotos[openIndex].caption}
              className="w-full max-h-[75vh] object-contain rounded-lg"
            />
            <div className="text-center mt-3 cf-serif text-white text-sm md:text-base">
              {unlockedPhotos[openIndex].caption}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
